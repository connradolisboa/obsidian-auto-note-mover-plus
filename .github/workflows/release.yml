name: Release Obsidian plugin

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Update dist folder
        run: |
          mkdir -p dist
          cp main.js dist/
          cp manifest.json dist/
          cp styles.css dist/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update dist for release ${GITHUB_REF#refs/tags/}"
          git push

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Try to upload to existing release, or create new one
          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag exists, uploading assets..."
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            echo "Creating release $tag..."
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              --generate-notes \
              main.js manifest.json styles.css
          fi
